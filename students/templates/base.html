<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio Academy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        
        * {
            -ms-overflow-style: none;  
            scrollbar-width: none;     
        }
        *::-webkit-scrollbar {
            display: none;             
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        .glass-nav {
            height: 70px;
            background: rgba(106, 17, 203, 0.25);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255,255,255,0.25);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 9999;
            display: flex;
            align-items: center;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .school-name {
            font-weight: 900;
            font-size: 28px;
            color: white;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }

        .school-sub {
            font-size: 18px;
            color: #f3e8ff;
        }

        .nav-links a {
            color: white;
            margin-left: 18px;
            text-decoration: none;
            font-weight: 600;
        }
        
        .nav-links a:hover {
            color: rgb(194, 14, 194);
        }

        
        @media (max-width: 991px) {
            .school-name { font-size: 20px; }
            .school-sub { font-size: 14px; }
            
            .navbar-collapse {
                background: rgba(45, 10, 90, 0.98);
                padding: 20px;
                border-radius: 0 0 15px 15px;
            }
            .nav-links {
                display: flex;
                flex-direction: column;
            }
            .nav-links a {
                margin: 12px 0;
                margin-left: 0;
            }
        }

        main {
            padding-top: 70px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: scroll; 
        }

        footer {
            background: black;
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 14px;
            flex-shrink: 0;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg glass-nav px-4">
    <div class="container-fluid">
        
        <div class="d-flex align-items-center gap-2">
            <div style="font-size:30px;">🎓</div>
            <div class="logo-text">
                <div class="school-name">ETHIO ACADEMY</div>
                <div class="school-sub">ኢትዮ አካዳሚ</div>
            </div>
        </div>

        <button class="navbar-toggler border-white" type="button" data-bs-toggle="collapse" data-bs-target="#ethioNav">
            <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
        </button>

        <div class="collapse navbar-collapse" id="ethioNav">
            <div class="nav-links ms-auto">
                <a href="/">HOME</a>
                <a href="{% url 'about' %}">ABOUT</a>
                <a href="{% url 'register' %}">REGISTER</a>
                <a href="{% url 'contact' %}">CONTACT</a>
                <a href="{% url 'login' %}">LOGIN</a>
                {% if user.is_superuser %}
                <a href="/admin/">ADMIN</a>
                {% endif %}
            </div>
        </div>

    </div>
</nav>

<main>
    {% block content %}
    {% endblock %}
</main>  

<footer>
    &copy; 2024 ETHIO ACADEMY
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
