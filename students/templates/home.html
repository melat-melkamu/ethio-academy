{% extends 'base.html' %}

{% block content %}

<style>
.hero {
    height: calc(100vh - 110px); 
    background-image: url("https://img.freepik.com/premium-photo/students-with-backpacks-smiles-their-faces-walking-through-school-gates-into-colorful_25996-10173.jpg?w=1800");
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
}

.hero::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

.hero-content {
    position: relative;
    font-family: cursive;
    font-size: xx-large;
}
.btn-warning{
    background-color: rgb(139, 89, 185);
}
</style>

<div class="hero">
    <div class="hero-content">
        <h1>Welcome to Ethio Academy</h1>
        <p>Step Into Excellence</p>

        <a href="{% url 'register' %}" class="btn btn-warning">
            Register Now
        </a>
    </div>
</div>

{% endblock %}
