{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-4">

        <div class="card shadow p-4" style="margin-top:60px;">

            <h3 class="text-center mb-3" style="color: rgb(171, 102, 171);">
                Login to Ethio Academy
            </h3>

            <form method="POST">
    {% csrf_token %}

    <!-- USERNAME -->
    <div class="mb-3">
        <input type="text" name="username" class="form-control" placeholder="Username" required>
    </div>

    <!-- PASSWORD -->
    <div class="mb-3">
        <input type="password" name="password" class="form-control" placeholder="Password" required>
    </div>

    <!-- LOGIN BUTTON -->
    <button class="btn w-100" type="submit"
        style="background: rgb(171, 102, 171); color: white;">
        Login
    </button>
</form>

        </div>

    </div>
</div>

{% endblock %}
