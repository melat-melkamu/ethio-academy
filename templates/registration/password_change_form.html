{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow p-4" style="margin-top:60px; border-radius: 15px;">
            <h3 class="text-center mb-3" style="color: #ffc107;">Change Password</h3>
            <p class="text-muted text-center">Hello {{ user.username }}, please enter your new password below.</p>
            <hr>
            
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-warning w-100" type="submit">
                    Update Password
                </button>
            </form>

            <div class="text-center mt-3">
                <a href="{% url 'student_dashboard' %}" class="text-secondary text-decoration-none">Cancel and Go Back</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
